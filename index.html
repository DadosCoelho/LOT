<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>LOT – Loterias</title>

  <link rel="icon" type="image/x-icon" href="icon.ico">

  <!-- Lottie Player -->
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      min-height: 100vh;
      padding: 12px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .container {
      width: 100%; max-width: 680px;
      background: #fff; border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #03750e, #40a63e);
      color: #fff; padding: 28px 20px 24px; text-align: center;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .header p  { margin-top: 6px; font-size: 0.9rem; opacity: 0.85; }

    .content { padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; }

    .section-label {
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: #94a3b8; margin-bottom: 4px;
    }

    .lottery-card {
      display: flex; align-items: center; gap: 16px;
      padding: 18px 20px; border-radius: 14px;
      border: 2px solid transparent; text-decoration: none; color: inherit;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s; cursor: pointer;
    }
    .lottery-card:active { transform: scale(0.98); }

    .card-teimosinha { background: linear-gradient(135deg, #f0fdf4, #dcfce7); border-color: #86efac; }
    .card-teimosinha:hover { border-color: #22c55e; box-shadow: 0 6px 20px rgba(34,197,94,0.2); transform: translateY(-2px); }
    .card-teimosinha .card-title { color: #166534; }
    .card-teimosinha .card-arrow { color: #22c55e; }

    .card-pascoa { background: linear-gradient(135deg, #faf5ff, #f3e8ff); border-color: #d8b4fe; }
    .card-pascoa:hover { border-color: #a855f7; box-shadow: 0 6px 20px rgba(168,85,247,0.2); transform: translateY(-2px); }
    .card-pascoa .card-title { color: #581c87; }
    .card-pascoa .card-arrow { color: #a855f7; }

    .card-body { flex: 1; min-width: 0; }
    .card-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 3px; }
    .card-desc  { font-size: 0.82rem; color: #64748b; line-height: 1.4; }

    .card-arrow  { font-size: 1.4rem; flex-shrink: 0; transition: transform 0.2s; }
    .lottery-card:hover .card-arrow { transform: translateX(4px); }

    /* ── Cards informativos (não clicáveis) ── */
    .info-card {
      border-radius: 14px; padding: 18px 20px;
      border: 2px solid transparent;
    }

    /* Card – Próximo Jogo */
    .card-proximo {
      background: linear-gradient(135deg, #fffbeb, #fef3c7);
      border-color: #fcd34d;
    }
    .card-proximo .info-card-title { color: #92400e; }

    /* Card – Saldos */
    .card-saldos {
      background: linear-gradient(135deg, #eff6ff, #dbeafe);
      border-color: #93c5fd;
    }
    .card-saldos .info-card-title { color: #1e3a8a; }

    .info-card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .info-card-title { font-size: 1.0rem; font-weight: 700; }

    .info-badge {
      font-size: 0.7rem; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .badge-teimosinha { background: #d1fae5; color: #065f46; }
    .badge-simples    { background: #fee2e2; color: #991b1b; }

    .info-row {
      display: flex; align-items: baseline; gap: 8px;
      font-size: 0.83rem; color: #475569; margin-bottom: 6px;
    }
    .info-row:last-child { margin-bottom: 0; }
    .info-label { font-weight: 600; white-space: nowrap; }
    .info-value { color: #1e293b; }

    /* tabela de saldos */
    .saldo-table { width: 100%; border-collapse: collapse; margin-top: 4px; }
    .saldo-table th, .saldo-table td {
      text-align: left; padding: 5px 8px; font-size: 0.82rem;
    }
    .saldo-table th { color: #64748b; font-weight: 600; border-bottom: 1px solid #bfdbfe; }
    .saldo-table tr:not(:first-child) td { border-top: 1px solid #e0ecff; }
    .saldo-positivo { color: #16a34a; font-weight: 700; }
    .saldo-zero     { color: #94a3b8; }
    .saldo-negativo { color: #dc2626; font-weight: 700; }

    /* Wrappers dinâmicos: transparentes para o layout flex do .content */
    #cards-jogos, #card-proximo-jogo, #card-saldos { display: contents; }

    .footer {
      text-align: center; padding: 16px; font-size: 0.78rem;
      color: #94a3b8; border-top: 1px solid #f1f5f9;
    }

    @media (max-width: 480px) {
      .header h1 { font-size: 1.6rem; }
      .content { padding: 16px 14px; }
      .lottery-card { padding: 15px 14px; }
      .card-title { font-size: 0.98rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">

      <h1>
        <lottie-player
          src="luck.json"
          background="transparent"
          speed="1"
          style="width: 80px; height: 80px;"
          loop
          autoplay>
        </lottie-player>

        LOTERIAS
      </h1>

      <p>Acompanhe nossos jogos da loteria!</p>
    </div>

    <div class="content" id="content">
      <!-- Cards de jogos existentes (visíveis conforme config.js) -->
      <div id="cards-jogos"></div>

      <!-- Cards: Próximos Jogos (Task 1 / Task 4) -->
      <div id="card-proximo-jogo"></div>

      <!-- Card: Saldos dos Jogadores (Task 2) -->
      <div id="card-saldos"></div>
    </div>

    <div class="footer">LOTERIAS · Projeto pessoal de acompanhamento de loterias</div>
  </div>

  <script src="config.js"></script>
  <script>
    /* ── Jogos existentes (visíveis via visivel no config) ── */
    (function () {
      const container = document.getElementById("cards-jogos");
      const jogos = [
        {
          cfg: CONFIG.lotofacilTeimosinha,
          href: "lotofacil-teimosinha.html",
          classe: "card-teimosinha",
          titulo: "Lotofácil - Teimosinha",
          desc: "Acompanhamento da teimosinha"
        },
        {
          cfg: CONFIG.duplaPascoa,
          href: "dupla-pascoa.html",
          classe: "card-pascoa",
          titulo: "Dupla de Páscoa 2026",
          desc: "Sorteio especial de abril"
        }
      ];

      jogos.forEach(function (j) {
        if (!j.cfg || j.cfg.visivel === false) return;
        const a = document.createElement("a");
        a.className = "lottery-card " + j.classe;
        a.href = j.href;
        a.innerHTML = `
          <div class="card-body">
            <div class="card-title">${j.titulo}</div>
            <div class="card-desc">${j.desc}</div>
          </div>
          <div class="card-arrow">›</div>`;
        container.appendChild(a);
      });
    })();

    /* ── Próximos Jogos (array) ── */
    (function () {
      const lista = CONFIG.proximosJogos;
      if (!lista || !lista.length) return;
      const container = document.getElementById("card-proximo-jogo");

      const modalidadeNome = {
        lotofacil: "Lotofácil",
        megasena: "Mega-Sena",
        quina: "Quina",
        duplasena: "Dupla Sena",
        lotomania: "Lotomania"
      };

      lista.forEach(function (cfg) {
        if (!cfg.visivel) return;

        const valorCota = (cfg.valorTotal / cfg.quantidadeCotas).toFixed(2).replace(".", ",");
        const valorTotal = cfg.valorTotal.toFixed(2).replace(".", ",");
        const tipoLabel = cfg.tipo === "teimosinha"
          ? `Teimosinha (${cfg.quantidadeConcursos} concursos)`
          : "Simples (1 concurso)";
        const badgeClass = cfg.tipo === "teimosinha" ? "badge-teimosinha" : "badge-simples";
        const nomeExibido = modalidadeNome[cfg.modalidade] || cfg.nomeJogo;

        const div = document.createElement("div");
        div.innerHTML = `
          <div class="info-card card-proximo">
            <div class="info-card-header">
              <span class="info-card-title">🎯 Próximo Jogo</span>
              <span class="info-badge ${badgeClass}">${cfg.tipo === "teimosinha" ? "Teimosinha" : "Simples"}</span>
            </div>
            <div class="info-row"><span class="info-label">Jogo:</span><span class="info-value">${nomeExibido}</span></div>
            <div class="info-row"><span class="info-label">Data:</span><span class="info-value">${cfg.dataRealizacao}</span></div>
            <div class="info-row"><span class="info-label">Valor por cota:</span><span class="info-value">R$ ${valorCota} <span style="color:#94a3b8;font-size:0.78rem;">(R$ ${valorTotal} ÷ ${cfg.quantidadeCotas} cotas)</span></span></div>
            <div class="info-row"><span class="info-label">Modalidade:</span><span class="info-value">${tipoLabel}</span></div>
          </div>`;
        container.appendChild(div.firstElementChild);
      });
    })();

    /* ── Saldos ── */
    (function () {
      const cfg = CONFIG.saldos;
      if (!cfg || !cfg.visivel) return;

      const rows = cfg.jogadores
        .map(j => {
          const cls = j.saldo > 0 ? "saldo-positivo" : j.saldo < 0 ? "saldo-negativo" : "saldo-zero";
          const valor = j.saldo.toFixed(2).replace(".", ",");
          return `<tr><td>${j.nome}</td><td class="${cls}">R$ ${valor}</td></tr>`;
        })
        .join("");

      document.getElementById("card-saldos").innerHTML = `
        <div class="info-card card-saldos">
          <div class="info-card-header">
            <span class="info-card-title">💰 Saldo dos Jogadores</span>
          </div>
          <table class="saldo-table">
            <thead><tr><th>Jogador</th><th>Saldo</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    })();
  </script>
</body>
</html>
